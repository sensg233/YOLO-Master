# Ultralytics YOLO 🚀, AGPL-3.0 license
# LoRA Training Configuration for YOLO-Master-EsMoE-N on VisDrone
# Usage: yolo train cfg=examples/lora_examples/issue50/yolo_master_visdrone_lora.yaml

# Global settings ------------------------------------------------------------------------------------------------------
task: detect # (str) YOLO task, i.e. detect, segment, classify, pose, obb
mode: train # (str) YOLO mode, i.e. train, val, predict, export, track, benchmark
device: 0 # (int | str | list) device: 0 or [0,1,2,3] for CUDA, 'cpu'/'mps', or -1/[-1,-1] to auto-select idle GPUs

# Train settings -------------------------------------------------------------------------------------------------------
model: examples/lora_examples/issue50/YOLO-Master-EsMoE-N.pt # (str, optional) COCO-pretrained YOLO-Master-EsMoE-N weights; checked/downloaded by run_visdrone_rank_sweep.py
data: ultralytics/cfg/datasets/VisDrone.yaml # (str, optional) COCO-pretrained -> VisDrone 10-class dense aerial detection

epochs: 30 # (int) number of epochs to train for
time: # (float, optional) max hours to train; overrides epochs if set
patience: 10 # (int) early stop after N epochs without val improvement
batch: 8 # (int) batch size; use -1 for AutoBatch
imgsz: 768 # (int | list) larger square size improves dense small-object recall on VisDrone
save: True # (bool) save train checkpoints and predict results
save_period: -1 # (int) save checkpoint every N epochs; disabled if < 1
cache: False # (bool | str) cache images in RAM (True/'ram') or on 'disk' to speed dataloading; False disables
workers: 8 # (int) dataloader workers (per RANK if DDP)
project: runs/lora_examples/issue50 # (str, optional) project name for results root
name: yolo_master_visdrone_lora_r8 # (str, optional) experiment name; results in 'project/name'
exist_ok: False # (bool) overwrite existing 'project/name' if True
pretrained: True # (bool | str) use pretrained weights (bool) or load weights from path (str)
optimizer: Adam # (str) optimizer: SGD, Adam, Adamax, AdamW, NAdam, RAdam, RMSProp, or auto
verbose: True # (bool) print verbose logs during training/val
seed: 0 # (int) random seed for reproducibility
deterministic: True # (bool) enable deterministic ops; reproducible but may be slower
single_cls: False # (bool) treat all classes as a single class
rect: False # (bool) rectangular batches for train; rectangular batching for val when mode='val'
cos_lr: True # (bool) cosine learning rate scheduler
close_mosaic: 10 # (int) disable mosaic augmentation for final N epochs (0 to keep enabled)
resume: False # (bool) resume training from last checkpoint in the run dir
amp: True # (bool) Automatic Mixed Precision (AMP) training; True runs AMP capability check
fraction: 0.2 # (float) fraction of training dataset to use (1.0 = all)
profile: False # (bool) profile ONNX/TensorRT speeds during training for loggers
freeze: # (int | list, optional) freeze first N layers (int) or specific layer indices (list)
multi_scale: True # (bool) multiscale training helps aerial scale variation
compile: False # (bool | str) enable torch.compile() backend='inductor'; True="default", False=off, or "default|reduce-overhead|max-autotune-no-cudagraphs"

# Val/Test settings ----------------------------------------------------------------------------------------------------
val: True # (bool) run validation/testing during training
split: val # (str) dataset split to evaluate: 'val', 'test' or 'train'
save_json: False # (bool) save results to COCO JSON for external evaluation
conf: # (float, optional) confidence threshold; defaults: predict=0.25, val=0.001
iou: 0.7 # (float) IoU threshold used for NMS
max_det: 1000 # (int) dense aerial scenes can exceed the COCO-style detection cap
half: False # (bool) use half precision (FP16) if supported
dnn: False # (bool) use OpenCV DNN for ONNX inference
plots: True # (bool) save plots and images during train/val

# LoRA settings --------------------------------------------------------------------------------------------------------
lora_r: 8 # (int) LoRA rank (0 to disable)
lora_alpha: 16 # (int) LoRA alpha
lora_dropout: 0.05 # (float) LoRA dropout
lora_bias: "none" # (str) LoRA bias type: "none", "all", "lora_only"
lora_backend: "auto" # (str) LoRA backend: "auto", "peft", "fallback"
lora_variant: "lora" # (str) Adapter variant: "lora", "loha", "dora"
lora_include_head: False # (bool) Do not LoRA-wrap the COCO head; adapt the rebuilt VisDrone detection head normally
lora_freeze_bn: True # (bool) Freeze BatchNorm layers during LoRA training
lora_target_modules: ["conv", "experts"] # (list[str], optional) YOLO conv paths plus ES_MOE expert conv branches
lora_save_adapters: True # (bool) Save LoRA adapters
lora_adapter_dir: "lora_adapter" # (str) Directory name for adapters
lora_auto_r_ratio: 0.0 # (float) Auto calculate LoRA rank based on params ratio
lora_use_dora: False # (bool) Enable DoRA (Weight-Decomposed Low-Rank Adaptation)
lora_use_rslora: True # (bool) Enable RS-LoRA scaling for better high-rank stability
lora_init_lora_weights: "gaussian" # (str) LoRA init mode: True/"default"=Kaiming, "gaussian", "olora"; "pissa" only works with Linear layers (not YOLO Conv2d)
lora_type: "lora" # (str) PEFT type: "lora", "loha", "lokr"
lora_quantization: "none" # (str) Quantization type: "none", "4bit", "8bit" (Requires bitsandbytes)
lora_include_moe: True # (bool) Include MoE layers in auto-detection
lora_include_attention: False # (bool) Include Attention layers in auto-detection
lora_only_backbone: False # (bool) Only apply LoRA to backbone
lora_only_3x3: False # (bool) Skip 1x1 convs during auto target detection for YOLO bottlenecks
# ES_MOE routing policy:
# - Current checkpoint maps to ultralytics/cfg/models/master/v0/det/yolo-master-n.yaml.
# - ES_MOE contains `routing` and `experts`; include expert conv branches, exclude routing/gating.
# - Short COCO -> VisDrone LoRA should adapt dense small-object feature transforms without
#   perturbing expert assignment before routing statistics stabilize.
lora_exclude_modules: ["routing", "router", "gate", "gating"] # (list[str], optional) Modules to exclude
lora_last_n: # (int, optional) Only apply to last N layers
lora_from_layer: # (int, optional) Start applying from layer index
lora_to_layer: # (int, optional) Stop applying at layer index
lora_allow_depthwise: False # (bool) Allow depthwise convolution
lora_kernels: # (list[int], optional) Filter by kernel size
lora_gradient_checkpointing: True # (bool) Enable gradient checkpointing for LoRA memory optimization

lr0: 0.001
lrf: 0.01
warmup_epochs: 3.0
weight_decay: 0.0005

mosaic: 1.0
mixup: 0.05
copy_paste: 0.0
scale: 0.7
translate: 0.1
fliplr: 0.5

lora_skip_stem: True
lora_min_channels: 32
lora_lr_mult: 1.0
lora_alpha_warmup: 3
